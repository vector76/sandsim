<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandsim</title>
    <style>
      html, body { height: 100%; margin: 0; overflow: hidden; background: #111; color: #eee; font-family: sans-serif; }
      canvas { display: block; width: 100%; height: 100%; }
      #warnings { position: fixed; top: 8px; left: 8px; z-index: 10; }
      #file-input { position: fixed; top: 8px; right: 8px; z-index: 10; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="warnings"></div>
    <input type="file" id="file-input" accept=".gcode,.nc,.txt,.cnc" />
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
