<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandsim</title>
    <style>
      html, body { height: 100%; margin: 0; overflow: hidden; background: #111; color: #eee; font-family: sans-serif; }
      canvas { display: block; width: 100%; height: 100%; }
      #warnings { position: fixed; top: 8px; left: 8px; z-index: 10; }
      #file-controls { position: fixed; top: 8px; right: 8px; z-index: 10; display: flex; gap: 6px; align-items: center; }
      #file-mode { background: #222; color: #eee; border: 1px solid #444; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="warnings"></div>
    <div id="file-controls">
      <select id="file-mode">
        <option value="reset" selected>Reset sand</option>
        <option value="append">Append onto existing pattern</option>
      </select>
      <input type="file" id="file-input" accept=".gcode,.nc,.txt,.cnc" />
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
