<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandsim</title>
    <style>
      html, body { height: 100%; margin: 0; overflow: hidden; background: #111; color: #eee; font-family: sans-serif; }
      canvas { display: block; width: 100%; height: 100%; }
      #warnings { position: fixed; top: 8px; left: 8px; z-index: 10; }
      #file-controls { position: fixed; top: 8px; right: 8px; z-index: 10; display: flex; gap: 6px; align-items: center; }
      #file-mode, #builtin-fixture { background: #222; color: #eee; border: 1px solid #444; }
      #builtin-load { background: #333; color: #eee; border: 1px solid #555; padding: 2px 8px; cursor: pointer; }
      #controls { position: fixed; top: 40px; right: 8px; z-index: 10; background: rgba(0,0,0,0.6); padding: 8px; min-width: 240px; color: #eee; font-family: sans-serif; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="warnings"></div>
    <div id="file-controls">
      <select id="file-mode">
        <option value="reset">Reset sand</option>
        <option value="append" selected>Append onto existing pattern</option>
      </select>
      <select id="builtin-fixture">
        <option value="">— built-in pattern —</option>
        <option value="square">square</option>
        <option value="spiral">spiral</option>
        <option value="rose">rose</option>
        <option value="v1_sandify">v1 sandify</option>
      </select>
      <button id="builtin-load" type="button">Load</button>
      <input type="file" id="file-input" accept=".gcode,.nc,.txt,.cnc" />
    </div>
    <div id="controls"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
